        <h1>program perkalian</h1>
        <span>masukan angka</span><br>
        <input type="number" id="angka"><br><br>
        <button onclick="hitung()">hitung</button><br>          
        <p>hasil : <br><span id = "hasil"></span></p>

        <script>

            function hitung(){
                let angka =parseFloat( document. getElementById('angka').value);
                let result = '';
            for(let i = 1; i <= 10; i++){
                result += `${i} x ${angka} = ${i*angka}<br>`
            }
                document.getElementById('hasil').innerHTML = result
            }
        
        </script>
