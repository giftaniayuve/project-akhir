<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>password generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="ye">
    <h1>password generator</h1><br>
    <div class="y">
    <label for="">password length : </label>
    <input type="number" id="len" value="12"  min="6"><br><br>

    <input type="checkbox" id="upper" checked>
    <label for="">include Uppercase</label><br><br>

    <input type="checkbox" id="nums" checked>
    <label for="">include number</label><br><br>

    <input type="checkbox" id="special" checked>
    <label for="">include special characters</label><br><br>
    </div>
    <div class="bu">
    <button onclick="generate()" style="padding: 15px; border-radius: 10px; border: none;">generate password</button><br><br>
    </div>
    <div class="res">
    <button onclick="reset()">reset</button><br>
    </div>
    <div class="P">
    <div class="output" id="passOut">your password is here</div><br>
    </div>
    </div>

    <script>
        function genPass(len,upper,nums,special){
            const lower = "abcdefghijklmnopqrstuvwxyz"
            const upperChars = "ABCDEFGHIJKLMNOPQRSTUVWXTZZ"
            const numChars = "0123456789"
            const specialChars = "!@#$%^&*()/.,;'[]`?><:{}|"
            let chars = lower

            if(upper) chars += upperChars;
            if(nums) chars += numChars;
            if(special) chars += specialChars;

            let pass = "";
            for(let i = 0; i < len; i++){
            const randInt = Math.floor(Math.random() * chars.length)
            pass += chars[randInt];
            }
        

        return pass;
        }
        function generate(){
            const len = parseInt(document.getElementById("len").value);
            const upper = document.getElementById("upper").checked;
            const nums = document.getElementById("nums").checked;
            const special = document.getElementById("special").checked;

            const pass = genPass(len,upper,nums,special);
            document.getElementById("passOut").textContent = pass;
        }

        function reset(){
            document .getElementById("len").value = 12;
            document .getElementById("upper").checked = true;
            document .getElementById("nums").checked = true;
            document .getElementById("special").checked = true;
            document .getElementById("passOut").textContent = "your password has been reset";

            
        }
    </script>
</body>
</html>
