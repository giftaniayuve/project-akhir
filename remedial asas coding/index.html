<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=Edge" />
    <title>Remedial Asas Coding Giftania Yuve</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="header">
        <h2>real-time charater counter</h2>
        </div>
        <div class="content">
            
        <textarea
     id="textarea"
     class="textarea"
     placeholder="please write your text here..."
     maxlength="500"
     ></textarea>
     <div class="cc">
        <p>
            Total Characters : 
            <span class="total-counter" id="total-counter"></span>
        </p>
        <p>
            Remaining : 
            <span class="remaining-counter" id="remain-counter">500</span>
        </p>
        </div>
     </div>
    </div>
    <script>
        const textareaEl = document.getElementById("textarea");
        const totalCounterEl = document.getElementById("total-counter")
        const remainingCounterEl = document.getElementById("remain-counter");

        textareaEl.addEventListener("keyup" , () => {
            updateCounter();
        });

        updateCounter()

        function updateCounter() {
             totalCounterEl.innerText = textareaEl.value.length;
             remainingCounterEl.innerText =
             textareaEl.getAttribute("maxlength") - textareaEl.value.length;
        }

  
    </script>
</body>
</html>
