<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carousel</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <style>
        *{
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 0;
            margin: 0;
        }

        #carousel{
            position: relative;
            width: 100%;
            overflow: hidden;
            margin: auto;
            border-radius: 10px;
        }

        #carousel-bks{
            display: flex;
            transition: 0.5s ease-in-out;
        }

        .slide{
            min-width: 100%;
            object-fit: cover;
        }

        #prev, #next{
            position: absolute;
            top: 50%;
            transform: translate(-50%);
            color: white;
            font-size: 2rem;
            padding: 80px;
            background-color: transparent;
            border: none;
            cursor: pointer;
            z-index: 99;
        }

        #prev{
            left: 80px;
        }

        #next{
            right: 10px;
        }

        .header{
            background-color: maroon;
            width: 100%;
            height: 10vh;
        }

        nav{
            display: flex;
            margin-left: 8%;
            padding-top: 15px;
            height: 16%;
            justify-content: space-between;
            list-style: none;
            align-items: center;
            padding-right: 8%;
            color: white;
        }

        nav h1{
            font-size: 1.6rem;
            padding-top: 150px;
        }

        nav ul li {
            cursor: pointer;
            display: inline-block;
            margin: 10px 20px;
            font-weight: 600;
            font-size: 5rem;
            padding-top: 150px;

        }

        
    </style>
    <div class="header">
        <nav>
            <h1>Store App</h1>
            <ul>
                <li>home</li>
                <li>product</li>
                <li>gallery</li>
            </ul>
        </nav>
    </div>

    <div class="dua">
        <li>home</li>
        <li>product</li>
        <li>galery</li>
    </div>

    <div id="carousel">
        <button id="prev">⏭️</button>
        <div id="carousel-bks">
            <img src="melzio1.jpg" alt="1" class="slide">
            <img src="melzio 2.jpg" alt="2" class="slide">
            <img src="melzio 3.png" alt="3" class="slide">
        </div>
        <button id="next">⏮️</button>
    </div>

    <script>
        const slide = document.querySelectorAll('.slide');
        const bks = document.getElementById('carousel-bks')
        const nextbtn = document.getElementById('next')
          const prevbtn = document.getElementById('prev')

          let currentIndex = 0;

          function showslide (index){
          bks.style.transform = `translateX(-${index * 100}%)`
          }

          nextbtn.addEventListener('click',() => {
            currentIndex = (currentIndex + 1)% slide.length;
            showslide(currentIndex);
          })

          prevbtn.addEventListener('click',() => {
            currentIndex = (currentIndex - 1)% slide.length;
            showslide(currentIndex);
          })
    </script>
</body>
</html>
