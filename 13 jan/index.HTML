<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Latihan forloop</title>
</head>
<body>
  
    <div class="container">
         <div class="isi">
             <h2>forloop</h2>
        <input type="number" id="numberInput" placeholder=" Masukan angka">
        <button onclick="tampilkanAngka()">Tampilkan</button>
        <h3>hasil :</h3>
  
        <div id="output"></div>
         </div>
    </div>

    <script>
        function tampilkanAngka(){
            let angka = document.getElementById("numberInput").value;
            let output = document.getElementById("output")

            output.innerHTML = ""; "<br> <br>"

            output.innerHTML += "<strong>Angka 1 sampai " + angka + ":</strong><br>";
            for(let i = 1; i <= angka; i++){
                output.innerHTML += i + " "
        }

              output.innerHTML += "<br><br>"
              
          output.innerHTML += "<strong><br>Angka Genap : </strong><br>";
            for(let i = 1; i <= angka; i++){
                if(i % 2 === 0)
                output.innerHTML += i + " "
        }

          output.innerHTML += "<br><br>"


        output.innerHTML += "<strong><br>angka Ganjil : </strong><br>";
            for(let i = 1; i <= angka; i++){
                if(i % 1 === 1)
                output.innerHTML += i + " "
        }

          output.innerHTML += "<br><br>"

        
 

        }
    </script>
    
</body>
</html>
