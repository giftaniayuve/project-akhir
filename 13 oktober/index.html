<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="a">
        <div class="pic">g</div>
    </div>
        

    <div class="cont">
            <div class="h">
    <h1>top uppus by giftania</h1>
    <p>sign out</p>
    </div>
    </div>

    <div class="b">
    <label for="">masukan no HP tujuan : </label>
    <input type="number" id="phone" style="width: 80%;" placeholder="masukan no hp :  misal 087456634">
    <button>bayar</button>
    </div>

    <div class="hc">
    <div id="operatorInfo"></div>
    </div>

    <div id="hargaList"></div>


    <script>
        const operatorData = [
            {
                name: "Telkomsel",
                preFixes:['0852', '0813', '0821', ' 0812', '0822','0823'],
                harga:[5000, 10000, 15000,  25000, 50000, 100000]
            },
            {
                name: "Indosat",
                preFixes:['0855', '0856', '0815', ' 0816'],
                harga:[5000, 10000, 15000,  25000, 50000, 100000]
            },
            {
                name: "Tri",
                preFixes:['0895', '0897', '0898', '0896'],
                harga:[5000, 10000, 15000,  25000, 50000, 100000]
            }
        ]

        const phoneInput = document .getElementById('phone');
        const operatorInfo = document .getElementById('operatorInfo');
        const hargaList = document .getElementById('hargaList');

        phoneInput.addEventListener('input', function(){
            const nomor = phoneInput.value.trim();
            const prefix = nomor.slice(0,4);

            let operator = null;

        for(let i = 0; i < operatorData.length; i++){
            if(operatorData[i].preFixes.includes(prefix)){
                operator = operatorData[i];
                break;
            }
        }

        if(operator){
            operatorInfo.innerHTML = "Operator Terdeteksi :" + operator.name;
            hargaList.innerHTML = '<div class="hc">' +
                 operator.harga.map(h => `<div class="harga-item"> Rp ${h.toLocaleString('id-ID')}</div>`).join('')+"</div>";
        }else{
            operatorInfo.innerText = "Operator Tidak Dikenali"
            hargaList.innerHTML = "";
        }
        });

    </script>
</body>
</html>
