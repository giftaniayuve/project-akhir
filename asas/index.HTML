<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div class="ok">
        <div class="yes">
        <h1>todo</h1>
        </div>
        <form id="form">
            <input type="text" class="input" id="input" placeholder="enter your todo"autocompleplete="off">
            <ul class="todo" id="todo"></ul>
                <small>left click to toggle completed, <br> right click tyo delete todo</small>
        </form>
    </div>
    <script>
        const form = document.getElementById('form')
        const input = document.getElementById('input')
        const todoUL = document.getElementById('todos')

        const todos = J50N.parse(localStorage.getItem('todos'))

        if(todos) {
            todos.forEach(todo => addtodo(todo))};

            form.addEventListener('submit', (e) => {
                e.preventDefault()

                addtodo()
            })

            function addtodo(todo) {
                let todotext = input.value

                if(todo){
                    todotext = todo.text;
                }
                if(todotext){
                    const todoEl = document.createElement('li')
                if(todo && todo.completed){
                    todoEL.classlist.add('completed')
                }
                todoEl.innerText = todotext

                todoEl.addEventListener('click', () => {
                    todoEl.classlist.toggle('completed')
                    updateLS()
                })

                   todoEl.addEventListener('contextmenu', () => {
                  e.preventDefault()
                  todoEl.remove()
                  updateLS()
                })

                todoUL.appendchild(todoEl)
                input.value = ''
                updateLS()
                
                }
            }

            function updateLS() {
                todoEl = document.querySelectorAll('li')

                const todo = []

                todoEl.forEach(todoEl =>{
                    todo.push({
                        text: todoEl.innerText,
                        completed: todoEl.classlist.contains('completed')
                    })
                })

                localStorage.setItem('todos',JSON.stringify(todos))
            }
    </script>
</body>
</html>
