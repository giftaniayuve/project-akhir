<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>30 sep 2025</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>fotobox by giftania</h1>
 
    <div class="bungkus">
       <div class="dua">
             <h2>Smile for the camera | CHeese!</h2>

        <video src="" id="video" autoplay></video>
        <button id="snap">take foto</button>
        <canvas id="canvas" style="display: none;"></canvas>
       </div>
        <div class="container">
            <div class="foto" id="photos">

        </div>
        </div>
    </div>

    <script>
        const video =  document.getElementById('video');
        const snapButton =  document.getElementById('snap');
        const canvas =  document.getElementById('canvas');
        const photoDiv =  document.getElementById('photos');
        const context =  canvas.getContext('2d');

        navigator.mediaDevices.getUserMedia({video : true})
        .then(stream => {
            video.srcObject = stream;
        })
        .catch(err => {
            console.log('tidak bisa akses kamera',err)
        })

        snapButton.addEventListener('click',()=>{
            context.drawImage(video, 0, 0, canvas.width, canvas.height);
            const imgData = canvas.toDataURL('image/png')
            const img = document.createElement('img')
            img.src = imgData;
            photoDiv.appendChild(img)
        });
        canvas.width = 250;
        canvas.height = 190;
    </script>

</body>
</html>
